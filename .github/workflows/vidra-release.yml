name: Vidra Release Workflow

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión de la aplicación (ej. v1.0.0)'
        required: true
        type: string

jobs:
  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Environment Variables
        run: |
          mkdir -p build/site-packages build/app
          echo "SERIOUS_PYTHON_SITE_PACKAGES=${GITHUB_WORKSPACE}/build/site-packages" >> $GITHUB_ENV
          echo "SERIOUS_PYTHON_APP=${GITHUB_WORKSPACE}/build/app" >> $GITHUB_ENV

      - name: Download & Extract Backend
        run: |
          BACKEND_URL=$(curl -s https://api.github.com/repos/chomusuke-mk/vidra-backend/releases/latest | jq -r '.assets[] | select(.name=="app.zip") | .browser_download_url')
          wget -qO backend.zip "$BACKEND_URL"
          mkdir -p app/src
          unzip -q backend.zip -d app/src

      - name: Download FFmpeg (Android)
        run: |
          FFMPEG_RELEASE=$(curl -s https://api.github.com/repos/chomusuke-mk/vidra-ffmpeg/releases/latest)
          for ABI in "arm64-v8a" "x86_64"; do
            URL=$(echo "$FFMPEG_RELEASE" | jq -r ".assets[] | select(.name | test(\"ffmpeg.*-full-android-$ABI.*\\\\.zip\", \"i\")) | .browser_download_url" | head -n 1)
            if [ -z "$URL" ] || [ "$URL" == "null" ]; then
              URL=$(echo "$FFMPEG_RELEASE" | jq -r ".assets[] | select(.name | test(\"ffmpeg.*-android-$ABI.*\\\\.zip\", \"i\")) | .browser_download_url" | head -n 1)
            fi
            wget -qO ffmpeg_${ABI}.zip "$URL"
            unzip -q ffmpeg_${ABI}.zip -d ffmpeg_${ABI}
            
            OUT_DIR="android/app/src/main/jniLibs/$ABI"
            mkdir -p "$OUT_DIR"
            cp ffmpeg_${ABI}/ffmpeg "$OUT_DIR/libffmpeg.so"
            cp ffmpeg_${ABI}/ffprobe "$OUT_DIR/libffprobe.so"
          done

      - name: Download QuickJS (Android)
        run: |
          QJ_RELEASE=$(curl -s https://api.github.com/repos/chomusuke-mk/vidra-quickjs/releases/latest)
          for ABI in "arm64-v8a" "x86_64"; do
            URL=$(echo "$QJ_RELEASE" | jq -r ".assets[] | select(.name | contains(\"quickjs-android-$ABI\")) | .browser_download_url" | head -n 1)
            OUT_DIR="android/app/src/main/jniLibs/$ABI"
            mkdir -p "$OUT_DIR"
            wget -qO "$OUT_DIR/libquickjs.so" "$URL"
          done

      - name: Package Serious Python (Android)
        run: |
          flutter pub get
          dart run serious_python:main package app/src -r -r -r app/requirements/base.txt -r -r -r app/requirements/Android.txt -p Android --verbose

      - name: Build Flutter APKs
        run: |
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk vidra-android.apk
          
          flutter build apk --split-per-abi --release
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk vidra-android-arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk vidra-android-x86_64.apk

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            vidra-android.apk
            vidra-android-arm64-v8a.apk
            vidra-android-x86_64.apk
          retention-days: 1

  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev rpm rpm-common fuse libfuse2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Environment Variables
        run: |
          mkdir -p build/site-packages build/app
          echo "SERIOUS_PYTHON_SITE_PACKAGES=${GITHUB_WORKSPACE}/build/site-packages" >> $GITHUB_ENV
          echo "SERIOUS_PYTHON_APP=${GITHUB_WORKSPACE}/build/app" >> $GITHUB_ENV

      - name: Download & Extract Backend
        run: |
          BACKEND_URL=$(curl -s https://api.github.com/repos/chomusuke-mk/vidra-backend/releases/latest | jq -r '.assets[] | select(.name=="app.zip") | .browser_download_url')
          wget -qO backend.zip "$BACKEND_URL"
          mkdir -p app/src
          unzip -q backend.zip -d app/src

      - name: Download FFmpeg (Linux)
        run: |
          FFMPEG_RELEASE=$(curl -s https://api.github.com/repos/chomusuke-mk/vidra-ffmpeg/releases/latest)
          URL=$(echo "$FFMPEG_RELEASE" | jq -r ".assets[] | select(.name | test(\"ffmpeg.*-full-linux.*\\\\.zip\", \"i\")) | .browser_download_url" | head -n 1)
          if [ -z "$URL" ] || [ "$URL" == "null" ]; then
            URL=$(echo "$FFMPEG_RELEASE" | jq -r ".assets[] | select(.name | test(\"ffmpeg.*-linux.*\\\\.zip\", \"i\")) | .browser_download_url" | head -n 1)
          fi
          wget -qO ffmpeg.zip "$URL"
          unzip -q ffmpeg.zip -d ffmpeg_ext
          mkdir -p linux
          cp ffmpeg_ext/ffmpeg linux/ffmpeg
          cp ffmpeg_ext/ffprobe linux/ffprobe
          chmod +x linux/ffmpeg linux/ffprobe

      - name: Download QuickJS (Linux)
        run: |
          QJ_RELEASE=$(curl -s https://api.github.com/repos/chomusuke-mk/vidra-quickjs/releases/latest)
          URL=$(echo "$QJ_RELEASE" | jq -r '.assets[] | select(.name | contains("quickjs-linux-x86_64")) | .browser_download_url' | head -n 1)
          mkdir -p linux
          wget -qO linux/quickjs "$URL"
          chmod +x linux/quickjs

      - name: Package Serious Python (Linux)
        run: |
          flutter pub get
          dart run serious_python:main package app/src -r -r -r app/requirements/base.txt -r -r -r app/requirements/Linux.txt -p Linux --verbose

      - name: Build Flutter Linux
        run: flutter build linux --release

      - name: Create AppImage, DEB and RPM
        run: |
          dart pub global activate flutter_distributor
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          flutter_distributor package --platform linux --targets appimage,deb,rpm --skip-clean
          
          find dist -name "*.AppImage" -exec cp {} vidra-linux.AppImage \;
          find dist -name "*.deb" -exec cp {} vidra-linux.deb \;
          find dist -name "*.rpm" -exec cp {} vidra-linux.rpm \;

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            vidra-linux.AppImage
            vidra-linux.deb
            vidra-linux.rpm
          retention-days: 1

  build-windows:
    name: Build Windows Exe
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Environment Variables
        run: |
          New-Item -Path "build\site-packages" -ItemType Directory -Force
          New-Item -Path "build\app" -ItemType Directory -Force
          echo "SERIOUS_PYTHON_SITE_PACKAGES=${env:GITHUB_WORKSPACE}\build\site-packages" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "SERIOUS_PYTHON_APP=${env:GITHUB_WORKSPACE}\build\app" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Download & Extract Backend
        run: |
          $release = Invoke-RestMethod "https://api.github.com/repos/chomusuke-mk/vidra-backend/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -eq "app.zip" }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "backend.zip"
          Expand-Archive -Path "backend.zip" -DestinationPath "app\src" -Force

      - name: Download FFmpeg (Windows)
        run: |
          $release = Invoke-RestMethod "https://api.github.com/repos/chomusuke-mk/vidra-ffmpeg/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "ffmpeg.*-full-windows.*\.zip" } | Select-Object -First 1
          if (-not $asset) {
              $asset = $release.assets | Where-Object { $_.name -match "ffmpeg.*-windows.*\.zip" } | Select-Object -First 1
          }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_ext" -Force
          New-Item -ItemType Directory -Force -Path "windows"
          Copy-Item "ffmpeg_ext\ffmpeg.exe" -Destination "windows\ffmpeg.exe"
          Copy-Item "ffmpeg_ext\ffprobe.exe" -Destination "windows\ffprobe.exe"

      - name: Download QuickJS (Windows)
        run: |
          $release = Invoke-RestMethod "https://api.github.com/repos/chomusuke-mk/vidra-quickjs/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "quickjs-windows-x86_64.exe" } | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path "windows"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "windows\quickjs.exe"

      - name: Package Serious Python (Windows)
        run: |
          flutter pub get
          dart run serious_python:main package app/src -r -r -r app/requirements/base.txt -r -r -r app/requirements/Windows.txt -p Windows --verbose

      - name: Build Flutter Windows
        run: flutter build windows --release

      - name: Package with Inno Setup
        run: |
          iscc installer.iss
          $exe = Get-ChildItem -Path Output -Filter *.exe | Select-Object -First 1
          Copy-Item $exe.FullName -Destination "vidra-windows.exe"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: vidra-windows.exe
          retention-days: 1

  publish-release:
    name: Publish Release
    needs: [build-android, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "Vidra ${{ github.event.inputs.version }}"
          body_path: CHANGELOG.md
          files: |
            artifacts/vidra-windows.exe
            artifacts/vidra-linux.AppImage
            artifacts/vidra-linux.deb
            artifacts/vidra-linux.rpm
            artifacts/vidra-android.apk
            artifacts/vidra-android-arm64-v8a.apk
            artifacts/vidra-android-x86_64.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}