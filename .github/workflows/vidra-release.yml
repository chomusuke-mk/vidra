name: Vidra Release Workflow

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Setup Environment Variables
        run: |
          mkdir -p .serious_python/site-packages .serious_python/app
          echo "SERIOUS_PYTHON_SITE_PACKAGES=${GITHUB_WORKSPACE}/.serious_python/site-packages" >> $GITHUB_ENV
          echo "SERIOUS_PYTHON_APP=${GITHUB_WORKSPACE}/.serious_python/app" >> $GITHUB_ENV

      - name: Download & Extract Backend
        run: |
          BACKEND_URL=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/chomusuke-mk/vidra-backend/releases/latest | jq -r '.assets[] | select(.name=="app.zip") | .browser_download_url')
          wget -qO backend.zip "$BACKEND_URL"
          mkdir -p app/src
          unzip -q backend.zip -d app/src

      - name: Download FFmpeg (Android)
        run: |
          FFMPEG_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/chomusuke-mk/vidra-ffmpeg/releases/latest)
          for ABI in "arm64-v8a" "x86_64"; do
            URL=$(echo "$FFMPEG_RELEASE" | jq -r ".assets[] | select(.name==\"ffmpeg-android-$ABI.zip\") | .browser_download_url")
            wget -qO ffmpeg_${ABI}.zip "$URL"
            unzip -q ffmpeg_${ABI}.zip -d ffmpeg_${ABI}
            
            OUT_DIR="android/app/src/main/jniLibs/$ABI"
            mkdir -p "$OUT_DIR"
            cp ffmpeg_${ABI}/ffmpeg "$OUT_DIR/libffmpeg.so"
            cp ffmpeg_${ABI}/ffprobe "$OUT_DIR/libffprobe.so"
          done

      - name: Download QuickJS (Android)
        run: |
          QJ_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/chomusuke-mk/vidra-quickjs/releases/latest)
          for ABI in "arm64-v8a" "x86_64"; do
            URL=$(echo "$QJ_RELEASE" | jq -r ".assets[] | select(.name==\"quickjs-android-$ABI\") | .browser_download_url")
            OUT_DIR="android/app/src/main/jniLibs/$ABI"
            mkdir -p "$OUT_DIR"
            wget -qO "$OUT_DIR/libquickjs.so" "$URL"
          done

      - name: Package Serious Python (Android)
        run: |
          flutter pub get
          dart run serious_python:main package app/src -r -r -r app/requirements/base.txt -r -r -r app/requirements/Android.txt -p Android --verbose

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > android/upload-keystore.pkcs12
          echo "storePassword=$ANDROID_KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$ANDROID_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$ANDROID_KEY_ALIAS" >> android/key.properties
          echo "storeFile=upload-keystore.pkcs12" >> android/key.properties

      - name: Build Flutter APKs
        run: |
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk vidra-android.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk vidra-android-arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk vidra-android-x86_64.apk

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-apks
          path: |
            vidra-android.apk
            vidra-android-arm64-v8a.apk
            vidra-android-x86_64.apk
          retention-days: 1

  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev rpm rpm-common fuse libfuse2 locate dpkg
          wget -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Setup Environment Variables
        run: |
          mkdir -p .serious_python/site-packages .serious_python/app
          echo "SERIOUS_PYTHON_SITE_PACKAGES=${GITHUB_WORKSPACE}/.serious_python/site-packages" >> $GITHUB_ENV
          echo "SERIOUS_PYTHON_APP=${GITHUB_WORKSPACE}/.serious_python/app" >> $GITHUB_ENV

      - name: Download & Extract Backend
        run: |
          BACKEND_URL=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/chomusuke-mk/vidra-backend/releases/latest | jq -r '.assets[] | select(.name=="app.zip") | .browser_download_url')
          wget -qO backend.zip "$BACKEND_URL"
          mkdir -p app/src
          unzip -q backend.zip -d app/src

      - name: Download FFmpeg (Linux)
        run: |
          FFMPEG_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/chomusuke-mk/vidra-ffmpeg/releases/latest)
          URL=$(echo "$FFMPEG_RELEASE" | jq -r '.assets[] | select(.name=="ffmpeg-linux-x86_64.zip") | .browser_download_url')
          wget -qO ffmpeg.zip "$URL"
          unzip -q ffmpeg.zip -d ffmpeg_ext
          mkdir -p linux
          cp ffmpeg_ext/ffmpeg linux/ffmpeg
          cp ffmpeg_ext/ffprobe linux/ffprobe
          chmod +x linux/ffmpeg linux/ffprobe

      - name: Download QuickJS (Linux)
        run: |
          QJ_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/chomusuke-mk/vidra-quickjs/releases/latest)
          URL=$(echo "$QJ_RELEASE" | jq -r '.assets[] | select(.name=="quickjs-linux-x86_64") | .browser_download_url')
          mkdir -p linux
          wget -qO linux/quickjs "$URL"
          chmod +x linux/quickjs

      - name: Package Serious Python (Linux)
        run: |
          flutter pub get
          dart run serious_python:main package app/src -r -r -r app/requirements/base.txt -r -r -r app/requirements/Linux.txt -p Linux --verbose

      - name: Build Flutter Linux
        run: flutter build linux --release

      - name: Create AppImage and DEB
        run: |
          dart pub global activate fastforge
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          fastforge release --name linux-release --skip-clean

          cp dist/vidra-linux.AppImage vidra-linux.AppImage
          cp dist/vidra-linux.deb vidra-linux.deb

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages
          path: |
            vidra-linux.AppImage
            vidra-linux.deb
          retention-days: 1

  build-windows:
    name: Build Windows Exe
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Setup Environment Variables
        run: |
          New-Item -Path ".serious_python\site-packages" -ItemType Directory -Force
          New-Item -Path ".serious_python\app" -ItemType Directory -Force
          echo "SERIOUS_PYTHON_SITE_PACKAGES=${env:GITHUB_WORKSPACE}\.serious_python\site-packages" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "SERIOUS_PYTHON_APP=${env:GITHUB_WORKSPACE}\.serious_python\app" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Download & Extract Backend
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/chomusuke-mk/vidra-backend/releases/latest" -Headers @{Authorization="Bearer ${{ secrets.GITHUB_TOKEN }}"}
          $asset = $release.assets | Where-Object { $_.name -eq "app.zip" }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "backend.zip"
          Expand-Archive -Path "backend.zip" -DestinationPath "app\src" -Force

      - name: Download FFmpeg (Windows)
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/chomusuke-mk/vidra-ffmpeg/releases/latest" -Headers @{Authorization="Bearer ${{ secrets.GITHUB_TOKEN }}"}
          $asset = $release.assets | Where-Object { $_.name -eq "ffmpeg-windows-x86_64.zip" }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_ext" -Force
          New-Item -ItemType Directory -Force -Path "windows"
          Copy-Item "ffmpeg_ext\ffmpeg.exe" -Destination "windows\ffmpeg.exe"
          Copy-Item "ffmpeg_ext\ffprobe.exe" -Destination "windows\ffprobe.exe"

      - name: Download QuickJS (Windows)
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/chomusuke-mk/vidra-quickjs/releases/latest" -Headers @{Authorization="Bearer ${{ secrets.GITHUB_TOKEN }}"}
          $asset = $release.assets | Where-Object { $_.name -eq "quickjs-windows-x86_64.exe" }
          New-Item -ItemType Directory -Force -Path "windows"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "windows\quickjs.exe"

      - name: Package Serious Python (Windows)
        run: |
          flutter pub get
          dart run serious_python:main package app/src -r -r -r app/requirements/base.txt -r -r -r app/requirements/Windows.txt -p Windows --verbose

      - name: Build Flutter Windows
        run: flutter build windows --release

      - name: Package with Inno Setup
        run: |
          $content = Get-Content pubspec.yaml | Select-String "^version: "
          $version = ($content -replace "version: ", "").Split("+")[0].Trim()
          iscc /DAppVer="$version" installer.iss
          Copy-Item "dist\vidra-windows.exe" -Destination "vidra-windows.exe"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: vidra-windows.exe
          retention-days: 1

  publish-release:
    name: Publish Release
    needs: [build-android, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
      
      - name: Extract Version for Release
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | xargs)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate Checksums
        working-directory: artifacts
        run: |
          sha256sum vidra-* > SHA2-256SUMS
          sha512sum vidra-* > SHA2-512SUMS

      - name: Generate GPG Signatures
        working-directory: artifacts
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --detach-sign --output SHA2-256SUMS.sig SHA2-256SUMS
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --detach-sign --output SHA2-512SUMS.sig SHA2-512SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: "Vidra v${{ steps.get_version.outputs.VERSION }}"
          body_path: CHANGELOG.md
          files: |
            artifacts/vidra-windows.exe
            artifacts/vidra-linux.AppImage
            artifacts/vidra-linux.deb
            artifacts/vidra-android.apk
            artifacts/vidra-android-arm64-v8a.apk
            artifacts/vidra-android-x86_64.apk
            artifacts/SHA2-256SUMS
            artifacts/SHA2-512SUMS
            artifacts/SHA2-256SUMS.sig
            artifacts/SHA2-512SUMS.sig
