output: dist/temp/
releases:
  - name: linux-release
    jobs:
      - name: linux-appimage
        package:
          platform: linux
          target: appimage
          hooks:
            post:
              - mkdir -p dist/
              - mv $(find $OUTPUT_DIRECTORY -name "*.AppImage") dist/vidra-linux.AppImage
      - name: linux-deb
        package:
          platform: linux
          target: deb
          hooks:
            post:
              - mkdir -p dist/
              - mv $(find $OUTPUT_DIRECTORY -name "*.deb") dist/vidra-linux.deb